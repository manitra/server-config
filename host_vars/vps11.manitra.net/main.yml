# ── Restic backup ──────────────────────────────────────────────────────────────
# To activate: set coolify_restic_backup_enabled: true here, then create
# host_vars/vps11.manitra.net/vault.yml with the following (ansible-vault):
#
#   coolify_restic_password: "<strong random password>"
#   coolify_restic_recovery_password: "<recovery key password>"
#
# Also ensure on vps06 (manual, one-time):
#   mkdir -p /home/backuper/backup/vps11
#   # append root@vps11 public key to /home/backuper/.ssh/authorized_keys
#
coolify_restic_backup_enabled: false
coolify_restic_repo: "sftp:backuper@vps06.manitra.net:/home/backuper/backup/vps11/restic-coolify"
coolify_restic_recovery_key_manage: true
