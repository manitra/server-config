---
relay_enabled: true
relay_hostname: build.manitra.net
relay_tls_cert: /etc/letsencrypt/live/build.manitra.net/fullchain.pem
relay_tls_key: /etc/letsencrypt/live/build.manitra.net/privkey.pem
relay_allowed_client_ip: 13.247.181.158
relay_allowed_sender_regex: '/^[^@]+@paositrafinances\.mg$/'
relay_smtp_user: paositra-relay
relay_smtp_password: "{{ vault_paositra_relay_password }}"

ufw_extra_allow_rules:
  - port: '587'
    proto: tcp
    from_ip: "{{ relay_allowed_client_ip }}"
    comment: prea relay submission
