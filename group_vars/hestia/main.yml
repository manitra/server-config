# define the host name as the inventory name of the server
server_hostname: "{{ inventory_hostname }}"

# Install flags for hestiacp install script
# values 'yes' or 'no'
hestia_install_flags:
  apache: 'no'
  phpfpm: 'yes'
  multiphp: 'yes'
  vsftpd: 'yes'
  proftpd: 'no'
  named: 'no'
  mysql: 'yes'
  postgresql: 'yes'
  exim: 'yes'
  dovecot: 'no'
  sieve: 'no'
  clamav: 'no'
  spamassassin: 'no'
  iptables: 'yes'
  fail2ban: 'yes'
  quota: 'no'
  api: 'yes'
  port: '8083'
  lang: 'en'

hestia_restic_recovery_key_manage: true
