---
# group_vars/coolify/main.yml
# ============================
# Variables that apply to every host in the [coolify] inventory group.
#
# Backups are enabled by default here. The restic repository path is derived
# automatically from the inventory hostname, so onboarding another Coolify host
# only needs an inventory entry in the [coolify] group.
#
# The public Coolify UI hostname also defaults to the inventory hostname. Override
# coolify_domain in host_vars only when a host should answer on a different name.
#
# Required vault variables live in group_vars/coolify/vault.yml.
# See group_vars/coolify/vault.example.yml for the expected plaintext structure
# before encrypting with ansible-vault:
#
#   coolify_restic_password: "<strong random password>"
#     – encrypts the restic repository; generate with: openssl rand -base64 32
#
#   coolify_restic_recovery_password: "<recovery key password>"
#     – only required when coolify_restic_recovery_key_manage: true
#     – allows opening the repo without the operational password
#
# By default the role auto-discovers running Postgres/MySQL/MariaDB containers
# and mounted Docker host paths. Use host_vars/<host>/main.yml only for
# exceptions, for example additional excludes or manual dump overrides.
#
# Coolify also needs its localhost SSH bootstrap key preserved. The maintain role
# therefore keeps primary-user authorized_keys non-exclusive on Coolify hosts,
# and the Coolify role manages the local bootstrap key automatically.

coolify_restic_backup_enabled: true
coolify_domain: "{{ inventory_hostname }}"
coolify_manage_localhost_ssh_bootstrap: true
maintain_primary_authorized_keys_exclusive: false

coolify_restic_backup_host: vps06.manitra.net
coolify_restic_backup_destination_user: backuper
coolify_restic_backup_destination_base_path: /home/backuper/backup
coolify_restic_repo_host_path: "{{ inventory_hostname.split('.')[0] }}"
coolify_restic_repo: >-
  sftp:{{ coolify_restic_backup_destination_user }}@{{ coolify_restic_backup_host }}:{{ coolify_restic_backup_destination_base_path }}/{{ coolify_restic_repo_host_path }}/restic-coolify

coolify_restic_recovery_key_manage: true
