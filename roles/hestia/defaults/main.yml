---
# server configs
# the hostname must already have been setup with an 'A' record
server_hostname: server.example.com

# hestia admin configs
# recommended to put this into vaul.yml of host_vars or group_vars
# Initial details of hestiacp admin user
hestia_admin_mail: admin@example.com
hestia_admin_pw: P@ssword123

# Install flags for hestiacp install script
# values 'yes' or 'no'
hestia_install_flags: 
  apache: 'no'
  phpfpm: 'yes'
  multiphp: 'no'
  vsftpd: 'yes'
  proftpd: 'no'
  named: 'no'
  mysql: 'yes'
  postgresql: 'no'
  exim: 'no'
  dovecot: 'no'
  sieve: 'no'
  clamav: 'no'
  spamassassin: 'no'
  iptables: 'yes'
  fail2ban: 'yes'
  quota: 'yes'
  api: 'yes'
  port: '8083'
  lang: 'en'

hestia_fail2ban_ignore_file: /etc/fail2ban/jail.d/98-trusted-client-ips.local
hestia_fail2ban_ignore_ips: []
hestia_fail2ban_ignore_legacy_files: []

# Hestia Exim uses SpamAssassin integer scores scaled by 10.
# 20.0 in SpamAssassin terms becomes SPAM_REJECT_SCORE = 200.
hestia_spam_reject_score: 20.0
hestia_mail_message_size_limit: 50M

hestia_spam_cleanup_retention_days: 7
hestia_spam_cleanup_script: /usr/local/sbin/hestia-clean-spam-maildirs
hestia_spam_cleanup_cron_file: /etc/cron.d/hestia-clean-spam-maildirs
hestia_spam_cleanup_hour: '3'
hestia_spam_cleanup_minute: '23'

# Incremental (restic) backup cron for hestiaweb
# Set to true to ensure the cron entry exists, false to ensure it is absent.
hestia_incremental_backup_cron: false
hestia_incremental_backup_cron_hour: '2'
hestia_incremental_backup_cron_minute: '23'
