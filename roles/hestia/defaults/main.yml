---
# server configs
# the hostname must already have been setup with an 'A' record
server_hostname: server.example.com

# hestia admin configs
# recommended to put this into vaul.yml of host_vars or group_vars
# Initial details of hestiacp admin user
hestia_admin_mail: admin@example.com
hestia_admin_pw: P@ssword123

# Install flags for hestiacp install script
# values 'yes' or 'no'
hestia_install_flags: 
  apache: 'no'
  phpfpm: 'yes'
  multiphp: 'no'
  vsftpd: 'yes'
  proftpd: 'no'
  named: 'no'
  mysql: 'yes'
  postgresql: 'no'
  exim: 'no'
  dovecot: 'no'
  sieve: 'no'
  clamav: 'no'
  spamassassin: 'no'
  iptables: 'yes'
  fail2ban: 'yes'
  quota: 'yes'
  api: 'yes'
  port: '8083'
  lang: 'en'

hestia_fail2ban_ignore_file: /etc/fail2ban/jail.d/98-trusted-client-ips.local
hestia_fail2ban_ignore_ips: []
hestia_fail2ban_ignore_legacy_files: []
