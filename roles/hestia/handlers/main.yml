---
# handlers file for hestiacp
- name: "reload systemd"
  become: true
  systemd:
    daemon_reload: true

- name: "restart nginx"
  become: true
  service:
    name: nginx
    state: restarted

- name: "reboot server"
  reboot:
    connect_timeout: 5
    reboot_timeout: 300
    pre_reboot_delay: 5
    post_reboot_delay: 30
    test_command: whoami
