---

# Coolify restic backup automation
# =================================
# Mirrors the pattern established by roles/hestia/tasks/backup.yml.
#
# Destination (backup host – vps06 today)
# ----------------------------------------
# Same backuper@vps06 account used by Hestia hosts:
#   - Unix account `backuper` on vps06
#   - SSH public-key access for root@<source-host>
#   - Directory /home/backuper/backup/<server>/ on vps06
#   - Standard OpenSSH SFTP (no special restic server required)
#
# Source host requirements (vps11 / any future coolify host)
# ----------------------------------------------------------
#   - restic binary installed (this task file installs it via apt)
#   - Docker running with the Coolify stack up
#   - coolify_restic_password set in group_vars/coolify/vault.yml
#
# What this task file automates
# ------------------------------
#   - Installs restic from the OS package manager
#   - Ensures the source host has a root SSH key for SFTP access
#   - Trusts the backup host SSH host key on the source host
#   - Creates /home/backuper/backup/<host> on vps06 automatically
#   - Authorizes the source host root SSH public key for backuper@vps06
#   - Writes the restic password file to coolify_restic_password_file
#     (default: /etc/restic/coolify.password, outside the backup path)
#   - Deploys the backup wrapper script from coolify-backup.sh.j2
#   - Auto-discovers running Postgres/MySQL/MariaDB containers and Docker mount
#     paths by default
#   - Supports manual overrides via coolify_backup_database_dumps(_extra)
#     (`container_name_prefix` is supported for timestamped Coolify app containers)
#   - Optionally adds a labeled recovery key to the repo
#     (coolify_restic_recovery_key_manage)
#   - Manages a root cron entry for the nightly backup job
#
# Backup strategy summary
# -----------------------
#   1. Logical dumps inside database containers → consistent SQL dumps
#   2. `restic backup` of app/config/upload paths excluding raw live DB dirs
#   3. `restic forget --prune` with configurable retention
#   4. Local dump removed once stored in restic
#
# How to onboard another Coolify host
# ------------------------------------
#   1. Add the host to [coolify] in inventory.ini.
#   2. Run hourly.yml (or target the coolify role directly).
#   3. Add host_vars/<host>/main.yml only for exceptions such as extra excludes,
#      custom dump definitions, or a non-default public Coolify domain.

- name: "Install restic"
  become: true
  ansible.builtin.apt:
    name: restic
    state: present
    update_cache: false
  when: coolify_restic_backup_enabled | bool

- name: "Assert restic repo and password are configured"
  ansible.builtin.assert:
    that:
      - coolify_restic_repo_base | length > 0
      - coolify_restic_backup_host | length > 0
      - coolify_restic_password | length > 0
      - >-
        (coolify_restic_backup_paths | length > 0)
        or
        (coolify_backup_autodiscover_mounts | bool)
    fail_msg: >-
      coolify_restic_backup_enabled is true but coolify_restic_repo_base or
      coolify_restic_password is empty, or the backup host is not configured,
      and neither seed backup paths nor mount autodiscovery are configured.
      Set them in group_vars/coolify/main.yml and group_vars/coolify/vault.yml
      before enabling backup.
  when: coolify_restic_backup_enabled | bool

- name: "Assert recovery passphrase is defined when recovery-key management is enabled"
  ansible.builtin.assert:
    that:
      - coolify_restic_recovery_password | length > 0
    fail_msg: >-
      coolify_restic_recovery_key_manage is true but
      coolify_restic_recovery_password is empty. Add it to
      group_vars/coolify/vault.yml (ansible-vault encrypted).
  when:
    - coolify_restic_backup_enabled | bool
    - coolify_restic_recovery_key_manage | bool

- name: "Validate logical dump definitions"
  ansible.builtin.assert:
    that:
      - item.name | length > 0
      - item.type in ['postgres', 'mysql', 'mariadb']
      - >-
        (item.container | default('') | length > 0)
        or
        (item.container_name_prefix | default('') | length > 0)
      - item.user | length > 0
      - item.output | length > 0
    fail_msg: >-
      Invalid entry in coolify_backup_database_dumps(_extra): {{ item | to_nice_yaml(indent=2) }}
  loop: "{{ coolify_backup_database_dumps + coolify_backup_database_dumps_extra }}"
  when: coolify_restic_backup_enabled | bool

- name: "Ensure restic password file directory exists"
  become: true
  ansible.builtin.file:
    path: "{{ coolify_restic_password_file | dirname }}"
    state: directory
    owner: root
    group: root
    mode: "0700"
  when: coolify_restic_backup_enabled | bool

- name: "Ensure root SSH directory exists for restic SFTP"
  become: true
  ansible.builtin.file:
    path: /root/.ssh
    state: directory
    owner: root
    group: root
    mode: "0700"
  when: coolify_restic_backup_enabled | bool

- name: "Ensure root SSH key exists for restic SFTP"
  become: true
  ansible.builtin.command:
    argv:
      - ssh-keygen
      - -t
      - ed25519
      - -a
      - "100"
      - -f
      - /root/.ssh/id_ed25519
      - -q
      - -N
      - ""
      - -C
      - "root@{{ inventory_hostname }}"
  args:
    creates: /root/.ssh/id_ed25519
  when: coolify_restic_backup_enabled | bool

- name: "Read root SSH public key for restic SFTP"
  become: true
  ansible.builtin.slurp:
    src: /root/.ssh/id_ed25519.pub
  register: coolify_restic_source_public_key
  no_log: true
  when: coolify_restic_backup_enabled | bool

- name: "Scan backup host SSH key"
  become: true
  ansible.builtin.command:
    argv:
      - ssh-keyscan
      - "{{ coolify_restic_backup_host }}"
  register: coolify_restic_backup_host_keyscan
  changed_when: false
  when: coolify_restic_backup_enabled | bool

- name: "Trust backup host SSH key for restic SFTP"
  become: true
  ansible.builtin.known_hosts:
    path: /root/.ssh/known_hosts
    name: "{{ coolify_restic_backup_host }}"
    key: "{{ item }}"
    state: present
  loop: "{{ coolify_restic_backup_host_keyscan.stdout_lines }}"
  when:
    - coolify_restic_backup_enabled | bool
    - coolify_restic_backup_host_keyscan.stdout_lines | length > 0

- name: "Ensure Coolify backup directory exists on backup host"
  become: true
  ansible.builtin.file:
    path: "{{ coolify_restic_repo_directory }}"
    state: directory
    owner: "{{ coolify_restic_backup_destination_user }}"
    group: "{{ coolify_restic_backup_destination_user }}"
    mode: "0700"
  delegate_to: "{{ coolify_restic_backup_host }}"
  when: coolify_restic_backup_enabled | bool

- name: "Authorize source host root SSH key on backup host"
  become: true
  ansible.posix.authorized_key:
    user: "{{ coolify_restic_backup_destination_user }}"
    key: "{{ coolify_restic_source_public_key.content | b64decode | trim }}"
    state: present
  delegate_to: "{{ coolify_restic_backup_host }}"
  no_log: true
  when: coolify_restic_backup_enabled | bool

- name: "Deploy restic password file"
  become: true
  ansible.builtin.copy:
    content: "{{ coolify_restic_password }}\n"
    dest: "{{ coolify_restic_password_file }}"
    owner: root
    group: root
    mode: "0600"
  no_log: true
  when: coolify_restic_backup_enabled | bool

- name: "Deploy restic recovery password file"
  become: true
  ansible.builtin.copy:
    content: "{{ coolify_restic_recovery_password }}\n"
    dest: "{{ coolify_restic_recovery_password_file }}"
    owner: root
    group: root
    mode: "0600"
  no_log: true
  when:
    - coolify_restic_backup_enabled | bool
    - coolify_restic_recovery_key_manage | bool

- name: "Remove restic recovery password file when recovery-key management is disabled"
  become: true
  ansible.builtin.file:
    path: "{{ coolify_restic_recovery_password_file }}"
    state: absent
  when:
    - coolify_restic_backup_enabled | bool
    - not coolify_restic_recovery_key_manage | bool

- name: "Deploy Coolify backup script"
  become: true
  ansible.builtin.template:
    src: coolify-backup.sh.j2
    dest: "{{ coolify_backup_script_path }}"
    owner: root
    group: root
    mode: "0750"
  when: coolify_restic_backup_enabled | bool

- name: "Remove Coolify backup script when backup is disabled"
  become: true
  ansible.builtin.file:
    path: "{{ coolify_backup_script_path }}"
    state: absent
  when: not coolify_restic_backup_enabled | bool

# ── Cron management ───────────────────────────────────────────────────────────

- name: "Ensure Coolify backup cron entry"
  become: true
  ansible.builtin.cron:
    name: "coolify restic backup"
    user: root
    minute: "{{ coolify_restic_backup_cron_minute }}"
    hour: "{{ coolify_restic_backup_cron_hour }}"
    job: >-
      {{ coolify_backup_script_path }}
      >> /var/log/coolify-backup.log 2>&1
    state: present
  when: coolify_restic_backup_enabled | bool

- name: "Remove Coolify backup cron when disabled"
  become: true
  ansible.builtin.cron:
    name: "coolify restic backup"
    user: root
    state: absent
  when: not coolify_restic_backup_enabled | bool
