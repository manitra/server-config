---

- name: Ensure `ufw` package is installed
  package:
    name: ufw
    state: present
  become: true

- name: Reset and reconfigure UFW
  block:
    - name: Reset UFW to wipe any unknown rules
      ufw:
        state: reset

    - name: Set default incoming policy to deny
      ufw:
        direction: incoming
        policy: deny

    - name: Set default outgoing policy to allow
      ufw:
        direction: outgoing
        policy: allow

    - name: Allow base SSH, HTTP, HTTPS and HestiaCP ports
      ufw:
        rule: allow
        port: "{{ item }}"
        proto: tcp
      with_items:
         - '22'
         - '80'
         - '443'
         - '8083'

    - name: Allow host-specific extra firewall rules
      ufw:
        rule: "{{ item.rule | default('allow') }}"
        port: "{{ item.port }}"
        proto: "{{ item.proto | default('tcp') }}"
        from_ip: "{{ item.from_ip | default('any') }}"
        to_ip: "{{ item.to_ip | default('any') }}"
        comment: "{{ item.comment | default(omit) }}"
      loop: "{{ ufw_extra_allow_rules | default([]) }}"

    - name: Enable UFW
      ufw:
        state: enabled

  rescue:
    - name: "RESCUE: Allow SSH before re-enabling firewall"
      ufw:
        rule: allow
        port: '22'
        proto: tcp

    - name: "RESCUE: Re-enable UFW to avoid leaving server open"
      ufw:
        state: enabled
        direction: incoming
        policy: deny

    - name: Fail the play after securing the firewall
      fail:
        msg: "UFW reconfiguration failed. Firewall re-enabled with SSH allowed. Check the errors above."
