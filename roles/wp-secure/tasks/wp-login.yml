---
# Deploy fail2ban filter + jail for wp-login.php brute-force attacks.
# Repeated POST requests to wp-login.php from the same IP indicate
# credential guessing, even if some succeed (attacker found a password).

- name: "[wp-secure wp-login] Deploy fail2ban filter"
  copy:
    dest: "/etc/fail2ban/filter.d/{{ wp_secure_wplogin_filter }}.conf"
    owner: root
    group: root
    mode: "0644"
    content: |
      # WordPress wp-login.php brute-force filter
      # Matches POST requests to wp-login.php (login attempts).
      # A handful of failures within findtime triggers a ban.
      # Admins who fat-finger their password a few times are unlikely
      # to hit maxretry within the findtime window.
      [Definition]
      failregex = ^<HOST> .* "POST /.*wp-login\.php
      ignoreregex =
  notify: reload fail2ban
  when: wp_secure_wplogin_enabled | bool

- name: "[wp-secure wp-login] Deploy fail2ban jail"
  template:
    src: jail-wplogin.conf.j2
    dest: "/etc/fail2ban/jail.d/{{ wp_secure_wplogin_filter }}.conf"
    owner: root
    group: root
    mode: "0644"
  notify: reload fail2ban
  when: wp_secure_wplogin_enabled | bool
