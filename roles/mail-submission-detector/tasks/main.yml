---
- name: Install detector dependencies
  ansible.builtin.apt:
    name:
      - dnsutils
    state: present
    update_cache: yes
    cache_valid_time: 3600
  when: mail_submission_detector_enabled

- name: Ensure detector config directory exists
  ansible.builtin.file:
    path: "{{ mail_submission_detector_config_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: mail_submission_detector_enabled

- name: Ensure detector state directory exists
  ansible.builtin.file:
    path: "{{ mail_submission_detector_state_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"
  when: mail_submission_detector_enabled

- name: Install mail submission detector script
  ansible.builtin.template:
    src: mail-submission-detector.py.j2
    dest: "{{ mail_submission_detector_script_path }}"
    owner: root
    group: root
    mode: "0755"
  when: mail_submission_detector_enabled

- name: Install mail submission detector config
  ansible.builtin.template:
    src: config.json.j2
    dest: "{{ mail_submission_detector_config_path }}"
    owner: root
    group: root
    mode: "0644"
  when: mail_submission_detector_enabled

- name: Schedule mail submission detector
  ansible.builtin.copy:
    dest: "{{ mail_submission_detector_cron_file }}"
    owner: root
    group: root
    mode: "0644"
    content: |
      # Managed by Ansible.
      PATH=/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
      {{ mail_submission_detector_cron_minute }} {{ mail_submission_detector_cron_hour }} * * * root {{ mail_submission_detector_script_path }}
  when: mail_submission_detector_enabled

- name: Remove mail submission detector cron when disabled
  ansible.builtin.file:
    path: "{{ mail_submission_detector_cron_file }}"
    state: absent
  when: not mail_submission_detector_enabled