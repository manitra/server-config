---
- name: Validate SMTP relay configuration
  ansible.builtin.assert:
    that:
      - relay_enabled | bool
      - relay_hostname is defined
      - relay_hostname | length > 0
      - relay_tls_cert is defined
      - relay_tls_cert | length > 0
      - relay_tls_key is defined
      - relay_tls_key | length > 0
      - relay_users is defined
      - relay_users | type_debug == 'list'
      - relay_users | length > 0
    fail_msg: Configure relay_users, including each user's vaulted password, before running this role.

- name: Validate SMTP relay users
  ansible.builtin.assert:
    that:
      - item.name is defined
      - item.name | length > 0
      - item.password is defined
      - item.password | length > 0
      - item.allowed_sender_regex is defined
      - item.allowed_sender_regex | length > 0
      - item.allowed_client_ips is defined
      - item.allowed_client_ips | type_debug == 'list'
      - item.allowed_client_ips | length > 0
    fail_msg: Configure each relay user with name, password, allowed_sender_regex, and allowed_client_ips.
  loop: "{{ relay_users }}"
  loop_control:
    label: "{{ item.name | default('unnamed relay user') }}"
  no_log: true

- name: Preseed Postfix mailer type
  ansible.builtin.debconf:
    name: postfix
    question: postfix/main_mailer_type
    value: Internet Site
    vtype: select

- name: Preseed Postfix mailname
  ansible.builtin.debconf:
    name: postfix
    question: postfix/mailname
    value: "{{ relay_hostname }}"
    vtype: string

- name: Install SMTP relay packages
  ansible.builtin.apt:
    name: "{{ relay_postfix_packages }}"
    state: present
    update_cache: yes
    cache_valid_time: 3600

- name: Ensure Postfix can query saslauthd
  ansible.builtin.user:
    name: postfix
    groups: sasl
    append: true

- name: Ensure SMTP relay auth users exist
  ansible.builtin.user:
    name: "{{ item.name }}"
    state: present
    system: true
    create_home: true
    home: "{{ item.home | default('/home/' ~ item.name) }}"
    shell: "{{ item.shell | default('/usr/sbin/nologin') }}"
    password: "{{ item.password | password_hash('sha512', item.password_salt | default(item.name | regex_replace('[^A-Za-z0-9./]', ''), true)) }}"
    update_password: always
  loop: "{{ relay_users }}"
  loop_control:
    label: "{{ item.name }}"
  no_log: true

- name: Ensure Postfix SASL config directory exists
  ansible.builtin.file:
    path: "{{ relay_sasl_config_dir }}"
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Configure Postfix SASL to use saslauthd
  ansible.builtin.copy:
    dest: "{{ relay_sasl_config_file }}"
    owner: root
    group: root
    mode: '0644'
    content: |
      pwcheck_method: saslauthd
      mech_list: PLAIN LOGIN
  notify: Restart Postfix

- name: Configure saslauthd shadow backend
  ansible.builtin.template:
    src: saslauthd.default.j2
    dest: /etc/default/saslauthd
    owner: root
    group: root
    mode: '0644'
  notify: Restart saslauthd

- name: Ensure per-user client access map directory exists
  ansible.builtin.file:
    path: "{{ relay_client_access_dir }}"
    state: directory
    owner: root
    group: root
    mode: '0755'

- name: Configure sender-to-login ownership map
  ansible.builtin.template:
    src: sender_login_maps.pcre.j2
    dest: "{{ relay_sender_login_maps_file }}"
    owner: root
    group: root
    mode: '0644'
  notify: Restart Postfix

- name: Configure SASL user access map
  ansible.builtin.template:
    src: sasl_access.pcre.j2
    dest: "{{ relay_sasl_access_file }}"
    owner: root
    group: root
    mode: '0644'
  notify: Restart Postfix

- name: Configure per-user client IP access maps
  ansible.builtin.template:
    src: client_access.cidr.j2
    dest: "{{ relay_client_access_dir }}/{{ item.name | regex_replace('[^A-Za-z0-9_.-]', '_') }}.cidr"
    owner: root
    group: root
    mode: '0644'
  loop: "{{ relay_users }}"
  loop_control:
    label: "{{ item.name }}"
  notify: Restart Postfix

- name: Remove obsolete global sender access map
  ansible.builtin.file:
    path: /etc/postfix/allowed_senders.pcre
    state: absent
  notify: Restart Postfix

- name: Configure Postfix main.cf relay settings
  ansible.builtin.lineinfile:
    path: /etc/postfix/main.cf
    regexp: "^{{ item.key | regex_escape }}\\s*="
    line: "{{ item.key }} = {{ item.value }}"
    create: true
    owner: root
    group: root
    mode: '0644'
  loop:
    - key: compatibility_level
      value: '3.6'
    - key: myhostname
      value: "{{ relay_hostname }}"
    - key: myorigin
      value: $myhostname
    - key: mydestination
      value: localhost
    - key: mynetworks
      value: 127.0.0.0/8 [::1]/128
    - key: inet_interfaces
      value: all
    - key: inet_protocols
      value: all
    - key: append_dot_mydomain
      value: 'no'
    - key: biff
      value: 'no'
    - key: readme_directory
      value: 'no'
    - key: smtpd_banner
      value: $myhostname ESMTP relay
    - key: message_size_limit
      value: "{{ relay_message_size_limit }}"
    - key: alias_maps
      value: hash:/etc/aliases
    - key: alias_database
      value: hash:/etc/aliases
    - key: smtpd_tls_cert_file
      value: "{{ relay_tls_cert }}"
    - key: smtpd_tls_key_file
      value: "{{ relay_tls_key }}"
    - key: smtpd_tls_security_level
      value: may
    - key: smtpd_tls_auth_only
      value: 'yes'
    - key: smtp_tls_security_level
      value: may
    - key: smtp_tls_loglevel
      value: '1'
    - key: smtpd_sasl_auth_enable
      value: 'yes'
    - key: smtpd_sasl_type
      value: cyrus
    - key: smtpd_sasl_path
      value: smtpd
    - key: cyrus_sasl_config_path
      value: "{{ relay_sasl_config_dir }}"
    - key: smtpd_sasl_security_options
      value: noanonymous
    - key: smtpd_sender_login_maps
      value: "pcre:{{ relay_sender_login_maps_file }}"
    - key: broken_sasl_auth_clients
      value: 'yes'
    - key: smtpd_helo_required
      value: 'yes'
    - key: disable_vrfy_command
      value: 'yes'
    - key: strict_rfc821_envelopes
      value: 'yes'
    - key: smtpd_relay_restrictions
      value: permit_sasl_authenticated,reject_unauth_destination
    - key: smtpd_sender_restrictions
      value: reject_non_fqdn_sender,reject_authenticated_sender_login_mismatch
    - key: smtpd_restriction_classes
      value: "{% for user in relay_users %}relay_{{ user.name | regex_replace('[^A-Za-z0-9]', '_') }}_client_access{% if not loop.last %}, {% endif %}{% endfor %}"
    - key: relay_submission_sender_restrictions
      value: reject_non_fqdn_sender,reject_authenticated_sender_login_mismatch
    - key: relay_submission_recipient_restrictions
      value: permit_sasl_authenticated, reject
    - key: relay_submission_relay_restrictions
      value: "check_sasl_access pcre:{{ relay_sasl_access_file }}, permit_sasl_authenticated, reject"
  notify: Restart Postfix

- name: Configure Postfix per-user client restriction classes
  ansible.builtin.blockinfile:
    path: /etc/postfix/main.cf
    marker: "# {mark} ANSIBLE MANAGED SMTP RELAY USER RESTRICTIONS"
    block: |
      {% for user in relay_users %}
      relay_{{ user.name | regex_replace('[^A-Za-z0-9]', '_') }}_client_access = check_client_access cidr:{{ relay_client_access_dir }}/{{ user.name | regex_replace('[^A-Za-z0-9_.-]', '_') }}.cidr, reject
      {% endfor %}
    create: true
    owner: root
    group: root
    mode: '0644'
  notify: Restart Postfix

- name: Configure Postfix master.cf with submission listener only
  ansible.builtin.template:
    src: master.cf.j2
    dest: /etc/postfix/master.cf
    owner: root
    group: root
    mode: '0644'
  notify: Restart Postfix

- name: Configure Fail2Ban postfix submission filter
  ansible.builtin.copy:
    dest: /etc/fail2ban/filter.d/postfix-submission.conf
    owner: root
    group: root
    mode: '0644'
    content: |
      [Definition]
      failregex = ^.*postfix/(?:submission/)?smtpd\[[0-9]+\]: warning: [^\[]+\[<HOST>\]: SASL (?:LOGIN|PLAIN) authentication failed: .*$
                  ^.*postfix/(?:submission/)?smtpd\[[0-9]+\]: warning: [^\[]+\[<HOST>\]: SASL authentication failure: .*$
      ignoreregex =
  notify: Restart fail2ban

- name: Configure Fail2Ban postfix submission jail
  ansible.builtin.copy:
    dest: /etc/fail2ban/jail.d/postfix-submission.local
    owner: root
    group: root
    mode: '0644'
    content: |
      [postfix-submission]
      enabled = true
      filter = postfix-submission
      backend = polling
      logpath = /var/log/mail.log
      port = 587,submission
      maxretry = 5
      findtime = 10m
      bantime = 1h
  notify: Restart fail2ban

- name: Ensure SMTP relay services are enabled and running
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: true
    state: started
  loop:
    - saslauthd
    - postfix
    - fail2ban
